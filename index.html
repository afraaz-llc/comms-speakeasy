<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>comms</title>
  <!-- maximum-scale=1 + user-scalable=no lock zoom at 1:1. REQUIRED on iOS:
       without it Safari loads pre-zoomed and auto-zooms+scrolls on input focus,
       which makes the compose box jerk and the page fly upward. Do not remove. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="a speakeasy for your WiFi — peer-to-peer drawing chat with whoever's on it. no accounts, no message history; your messages go browser to browser, never through a server.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta property="og:title" content="comms">
  <meta property="og:description" content="a speakeasy for your WiFi — peer-to-peer drawing chat with whoever's on it. no accounts, no message history; your messages go browser to browser, never through a server.">
  <meta property="og:image" content="https://speakeasy.comms.fish/og-image.png">
  <meta property="og:url" content="https://speakeasy.comms.fish/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <!-- Content-Security-Policy. script-src 'self' is the high-value part: all
       code is now same-origin (Trystero is vendored), so injected/external
       scripts are blocked. connect-src stays permissive on wss:/stun: so the
       Nostr relays + WebRTC keep working without enumerating them (the relay
       set is fixed, not rotating); it still blocks http(s) exfiltration.
       style 'unsafe-inline' is required
       for the inline styles the app sets via JS. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss: stun: turn: turns:; base-uri 'self'; form-action 'none'">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="styles.css?v=31">
</head>
<body>
  <main class="comms-app">

    <section class="message-log" id="messageLog">
      <!-- Empty-state hint. Pure CSS handles visibility: hidden once any
           .message exists (:has), and the alone/together text swaps on the
           .has-peers class. No presence count — just the same binary cue the
           send button already gives. -->
      <div class="empty-hint">
        <span class="hint-alone">you're the first one here.<br>messages show up when someone else on the same WiFi opens comms too.</span>
        <span class="hint-together">someone else is here — say something.</span>
      </div>
    </section>

    <section class="compose">

      <div class="paint-toolbar">
        <div class="tool-group sizes">
          <button class="size-btn"        data-size="2"><span style="height:2px"></span></button>
          <button class="size-btn active" data-size="4"><span style="height:4px"></span></button>
          <button class="size-btn"        data-size="8"><span style="height:8px"></span></button>
        </div>
        <div class="palette" id="palette"></div>
        <button class="tool-btn" id="clearBtn" title="clear scribbles">🗑️</button>
        <button class="tool-btn" id="scrollBottomBtn" title="scroll to bottom">▼</button>
        <label class="name-label header-name">
          <span class="name-label-text">you:</span>
          <input type="text" id="username" maxlength="12" placeholder="anon" spellcheck="false">
        </label>
      </div>

      <div class="compose-area">
        <textarea id="messageInput" rows="3" spellcheck="false"></textarea>
        <canvas id="composeCanvas"></canvas>
        <button class="send-btn" id="sendBtn">
          <span>send</span>
          <span class="send-arrow">↗</span>
        </button>
      </div>

    </section>

  </main>

  <script type="module" src="app.js?v=28"></script>
  <!--
    app.js is an ES module. Trystero is vendored locally in ./vendor, so
    the app loads with no runtime CDN dependency. Peer discovery still needs
    internet (Nostr relays), but the UI always loads.
  -->

</body>
</html>
